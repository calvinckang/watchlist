<!doctype html>
<html lang="en">
	<head>
		<script>
			(function(){var e=localStorage.getItem("theme"),m=window.matchMedia("(prefers-color-scheme: dark)").matches,t=e==="light"||e==="dark"?e:(m?"dark":"light");document.documentElement.setAttribute("data-theme",t)})();
		</script>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
